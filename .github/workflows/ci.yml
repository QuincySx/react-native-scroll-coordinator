name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn typecheck
      - run: yarn test
      - run: yarn test:release
      - run: yarn test:tarball
      - run: yarn workspace CoordinatorExample test --runInBand
      - run: yarn workspace CoordinatorExample build:web
      - run: yarn workspace CoordinatorExample lint

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: corepack enable
      - run: yarn install --immutable
      - run: >-
          ./example/android/gradlew -p example/android
          :react-native-scroll-coordinator:testDebugUnitTest
          :react-native-scroll-coordinator:lintDebug
          :app:assembleDebug

  ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - run: bundle install
        working-directory: example
      - run: bundle exec pod install
        working-directory: example/ios
      - run: >-
          xcodebuild
          -workspace CoordinatorExample.xcworkspace
          -scheme CoordinatorExample
          -sdk iphonesimulator
          -configuration Debug
          CODE_SIGNING_ALLOWED=NO
          build
        working-directory: example/ios

name: Bug report
description: Report a reproducible behavior regression
title: 'bug: '
labels: [bug]
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [Android, iOS, Web, Multiple]
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Version matrix
      description: Library, React Native, OS/API, device, and list engine versions
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the view hierarchy, gestures, and runnable repository when possible
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, traces, screen recording, and performance measurements

plugins {
    id 'com.android.library' version '9.3.0' apply false
    id 'com.facebook.react' apply false
}

ext {
    buildToolsVersion = '36.0.0'
    compileSdkVersion = 36
    minSdkVersion = 24
    reactNativeVersion = '0.81.5'
    targetSdkVersion = 36
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}
